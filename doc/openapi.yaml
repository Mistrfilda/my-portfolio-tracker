openapi: 3.0.0

info:
    title: My Portfolio Tracker API
    version: 1.0.0

tags:
    - name: System
      description: System and health-check endpoints.
    - name: Dashboard
      description: Dashboard summary endpoints.
    - name: Stocks
      description: Stock asset endpoints.
    - name: Home Devices
      description: Home device measurement endpoints.

security:
    - ApiKey: []

paths:
    /ping:
        get:
            summary: Ping the API
            tags:
                - System
            security:
                - ApiKey: []
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    status:
                                        type: string
                                        example: ok
    /dashboard/values:
        get:
            summary: Get dashboard value groups
            tags:
                - Dashboard
            security:
                - ApiKey: []
            responses:
                '200':
                    description: List of dashboard value groups
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/DashboardValueGroup'
    /stocks:
        get:
            summary: Get list of all stock assets
            tags:
                - Stocks
            security:
                - ApiKey: []
            responses:
                '200':
                    description: List of stock assets
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/StockAsset'
    /home/device/record:
        post:
            summary: Create a new home device record
            tags:
                - Home Devices
            security:
                - ApiKey: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/HomeDeviceRecordCreate'
            responses:
                '200':
                    description: Created home device record
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/HomeDeviceRecord'
    /home/device/records:
        get:
            summary: Get all devices with their latest measurements
            tags:
                - Home Devices
            security:
                - ApiKey: []
            parameters:
                - name: limit
                  in: query
                  required: false
                  description: Number of records to return per device (default 10)
                  schema:
                      type: integer
                      default: 10
            responses:
                '200':
                    description: List of devices with their measurements
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/HomeDeviceWithRecords'

components:
    securitySchemes:
        ApiKey:
            type: apiKey
            in: header
            name: X-Api-Key
    schemas:
        StockAsset:
            type: object
            additionalProperties: false
            required:
                - id
                - name
                - ticker
                - exchange
                - currency
                - price
                - trend
                - oneDayChange
                - sevenDayChange
                - thirtyDayChange
                - priceDownloadedAt
                - assetPriceDownloader
            properties:
                id:
                    type: string
                    format: uuid
                name:
                    type: string
                ticker:
                    type: string
                isin:
                    type: string
                    nullable: true
                exchange:
                    type: string
                currency:
                    type: string
                price:
                    type: number
                    format: float
                trend:
                    type: string
                    enum:
                        - increasing
                        - decreasing
                oneDayChange:
                    type: number
                    format: float
                sevenDayChange:
                    type: number
                    format: float
                thirtyDayChange:
                    type: number
                    format: float
                priceDownloadedAt:
                    type: string
                    format: date-time
                assetPriceDownloader:
                    type: string
        DashboardValue:
            type: object
            additionalProperties: false
            required:
                - label
                - value
                - color
            properties:
                label:
                    type: string
                value:
                    type: string
                color:
                    type: string
                svgIcon:
                    type: string
                    nullable: true
                description:
                    type: string
                    nullable: true
                type:
                    type: string
                    nullable: true
        DashboardValueTable:
            type: object
            additionalProperties: false
            required:
                - label
                - value
                - color
                - heading
                - data
            properties:
                label:
                    type: string
                value:
                    type: string
                color:
                    type: string
                heading:
                    type: object
                    additionalProperties:
                        type: string
                data:
                    type: array
                    items:
                        type: object
                        additionalProperties: true
        DashboardValueGroup:
            type: object
            additionalProperties: false
            required:
                - name
                - heading
                - positions
                - isOpen
                - tables
            properties:
                name:
                    type: string
                heading:
                    type: string
                description:
                    type: string
                    nullable: true
                positions:
                    type: array
                    items:
                        $ref: '#/components/schemas/DashboardValue'
                isOpen:
                    type: boolean
                tables:
                    type: array
                    items:
                        $ref: '#/components/schemas/DashboardValueTable'
        HomeDeviceRecordCreate:
            type: object
            additionalProperties: false
            required:
                - internalId
            properties:
                internalId:
                    type: string
                value:
                    oneOf:
                        - type: number
                          format: float
                        - type: boolean
                        - type: string
                    nullable: true
                unit:
                    type: string
                    nullable: true
                    enum:
                        - celsius
        HomeDeviceRecord:
            type: object
            additionalProperties: false
            required:
                - id
                - deviceInternalId
                - createdAt
            properties:
                id:
                    type: string
                    format: uuid
                deviceInternalId:
                    type: string
                value:
                    oneOf:
                        - type: number
                          format: float
                        - type: boolean
                        - type: string
                    nullable: true
                unit:
                    type: string
                    nullable: true
                createdAt:
                    type: string
                    format: date-time
        HomeDeviceRecordSimple:
            type: object
            additionalProperties: false
            required:
                - id
                - createdAt
            properties:
                id:
                    type: string
                    format: uuid
                value:
                    oneOf:
                        - type: number
                          format: float
                        - type: boolean
                        - type: string
                    nullable: true
                unit:
                    type: string
                    nullable: true
                createdAt:
                    type: string
                    format: date-time
        HomeDeviceWithRecords:
            type: object
            additionalProperties: false
            required:
                - id
                - internalId
                - name
                - type
                - records
            properties:
                id:
                    type: string
                    format: uuid
                internalId:
                    type: string
                name:
                    type: string
                type:
                    type: string
                latestRecord:
                    oneOf:
                        - $ref: '#/components/schemas/HomeDeviceRecordSimple'
                        - type: 'null'
                records:
                    type: array
                    items:
                        $ref: '#/components/schemas/HomeDeviceRecordSimple'


servers:
    - url: /api/v1
    - url: http://localhost/my-portfolio-tracker/www/api/v1
